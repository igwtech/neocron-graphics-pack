# vkBasalt config for Neocron 2 / Evolution under Wine/Proton (Linux/macOS).
# Activated by the launcher via ENABLE_VKBASALT=1 + VKBASALT_CONFIG_FILE.
# v0.3.0 ships built-in effects only (no external .fx) — SMAA + CAS gives
# the most visible cleanup with zero shader-path resolution issues. Future
# versions may add Bloom/LevelsPlus/Vibrance via the bundled ReShade .fx.

effects = smaa,cas

# CAS: detail-aware sharpening, recovers texture detail buried under DXVK's
# bilinear upscaling without amplifying noise on flat surfaces.
casSharpness = 0.6

# SMAA: catches the edge crawl on Neocron's stair-stepped geometry.
# Threshold 0.05 is more aggressive than the 0.10 default — cost is small
# and Neocron has plenty of pixel-thick edges that need it.
smaaEdgeDetection = luma
smaaThreshold = 0.05
smaaMaxSearchSteps = 32
smaaMaxSearchStepsDiag = 16
smaaCornerRounding = 25

# Toggle the entire effect chain with Home (matches ReShade default binding).
toggleKey = Home
enableOnLaunch = True
