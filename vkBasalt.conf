# Full Neocron cyberpunk preset for vkBasalt — matches the Windows ReShade
# preset (SMAA + MXAO + SSDO + SSR + Bloom + LevelsPlus + Vibrance + LUT +
# AdaptiveSharpen). vkBasalt loads ReShade .fx shaders directly.
#
# IMPORTANT: vkBasalt's `effects` field is COLON-separated, not comma.
# Apply order matters: AA first → geometry-aware (AO/SSR use depth) →
# color/light passes → sharpening last.
#
# Paths are RELATIVE to the game install dir (the game's CWD when running).
# vkBasalt resolves them via std::filesystem against the game process CWD.
# This keeps the conf portable across users — no ${HOME} hardcoded.

effects = smaa:mxao:ssdo:ssr:bloom:levelsplus:vibrance:lut:adaptivesharpen

# vkBasalt 0.3.2.10's preprocessor asserts !path.empty() on these BEFORE
# any effect initializes — even built-ins like SMAA hit that path. Without
# them set the addon crashes with a vector-bounds assertion.
reshadeIncludePath = "reshade-shaders/Shaders"
reshadeTexturePath = "reshade-shaders/Textures"

# Effect name → .fx path. Names are arbitrary as long as they match what's
# in `effects`. We use lowercase aliases for clarity.
mxao            = reshade-shaders/Shaders/qUINT_mxao.fx
ssdo            = reshade-shaders/Shaders/PPFX_SSDO.fx
ssr             = reshade-shaders/Shaders/qUINT_ssr.fx
bloom           = reshade-shaders/Shaders/Bloom.fx
levelsplus      = reshade-shaders/Shaders/LevelsPlus.fx
vibrance        = reshade-shaders/Shaders/Vibrance.fx
adaptivesharpen = reshade-shaders/Shaders/AdaptiveSharpen.fx

# qUINT_mxao + qUINT_ssr both need depth capture from the DXVK swapchain.
depthCapture = on

# Cyberpunk LUT — cool-shadow / magenta-highlight grading, gentle vibrance,
# slight black crush. Generated procedurally; see build_lut.py for the
# recipe. Drop your own 1024×32 ReShade-style LUT here to replace it.
lutFile = "reshade-shaders/Textures/neocron_cyberpunk_lut.png"

# --- SMAA built-in tuning ---
# Threshold 0.05 is more aggressive than the 0.10 default — Neocron has
# plenty of pixel-thick edges that need it; cost is small.
smaaEdgeDetection = luma
smaaThreshold = 0.05
smaaMaxSearchSteps = 32
smaaMaxSearchStepsDiag = 16
smaaCornerRounding = 25

# Toggle the entire effect chain with Home (matches ReShade default binding).
toggleKey = Home
enableOnLaunch = True
