# vkBasalt config for Neocron 2 / Evolution under Wine/Proton (Linux/macOS).
# Activated by the launcher via ENABLE_VKBASALT=1 + VKBASALT_CONFIG_FILE.
#
# CAS-only. Live testing on Neocron Evolution (DXVK 2.x + vkBasalt 0.3.2.10
# + Proton GE-9-26) showed both SMAA and FXAA crash the game during D3D9
# init — neither vkBasalt anti-aliasing path tolerates Neocron's swapchain
# format. CAS works reliably and is the most visible single effect on a
# 2002-era engine anyway: recovers texture detail buried under bilinear
# filtering without amplifying noise on flat surfaces.
#
# Future: if upstream vkBasalt fixes the AA crash, we can add SMAA back.
# Not filed upstream yet — needs a minimal repro outside Neocron first.

effects = cas

casSharpness = 0.6

# Toggle on/off in-game with Home (matches ReShade default binding).
toggleKey = Home
enableOnLaunch = True
