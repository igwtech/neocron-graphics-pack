PreprocessorDefinitions=
Techniques=SMAA,LumaSharpen,AmbientLight
TechniqueSorting=SMAA,LumaSharpen,AmbientLight

[SMAA.fx]
EdgeDetectionType=1
EdgeDetectionThreshold=0.10
MaxSearchSteps=32
MaxSearchStepsDiagonal=16
CornerRounding=25
PredicationEnabled=0
PredicationStrength=0.4
PredicationScale=2.0
PredicationThreshold=0.01

[LumaSharpen.fx]
sharp_strength=0.65
sharp_clamp=0.035
pattern=1
offset_bias=1.0

[AmbientLight.fx]
alAdaptBaseMult=1.0
alLensThresh=0.5
alAdapt=0.7
alAdaptBaseBlackLvL=2
alInt=10.5
alThreshold=15.0
alDebug=0
alAdaptiveLight=0
alLensThresh2=0.6
alLensInt=2.0
alDirtTex=0
;
; Default preset enables three modest, broadly-liked effects:
;  - SMAA       : subpixel anti-aliasing (sharper than FXAA, cheaper than MSAA on shaders)
;  - LumaSharpen: subtle sharpening to compensate for textures upsampled by dgVoodoo2
;  - AmbientLight: light bloom/eye-adaptation for that "modern" feel
;
; Press Home in-game to open the ReShade overlay and toggle others (DoF, Bloom,
; Tonemap, etc.). Save your customized preset here to override these defaults.
;
