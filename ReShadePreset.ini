PreprocessorDefinitions=RESHADE_DEPTH_INPUT_IS_UPSIDE_DOWN=0,RESHADE_DEPTH_INPUT_IS_REVERSED=0,RESHADE_DEPTH_INPUT_IS_LOGARITHMIC=0
Techniques=SMAA,MXAO,BloomAndLensFlares,LevelsPlus,Vibrance,AdaptiveSharpen
TechniqueSorting=SMAA,MXAO,BloomAndLensFlares,LevelsPlus,Vibrance,AdaptiveSharpen

;; ----------------------------------------------------------------------
;; Technique names match crosire/reshade-shaders 'nvidia' branch — the
;; only mainstream pack that ships SMAA + MXAO + Bloom + LevelsPlus +
;; Vibrance + AdaptiveSharpen together. See README.md "Manual steps" for
;; the clone command.
;; ----------------------------------------------------------------------

;; --- Anti-aliasing ---
;; Cleans up the edge crawl on Neocron's stair-stepped geometry.
;; Threshold 0.10 catches more edges than the 0.15 default; cost is small.

[SMAA.fx]
EdgeDetectionType=1
EdgeDetectionThreshold=0.10
MaxSearchSteps=32
MaxSearchStepsDiagonal=16
CornerRounding=25
PredicationEnabled=0

;; --- Ambient occlusion ---
;; MXAO grounds objects in the world — adds the contact shadows the
;; original engine never had. Sample radius is intentionally small so
;; the effect doesn't bleed onto UI elements (which sit at depth 1.0).
;; If you see "halos" around objects, lower MXAO_SAMPLE_RADIUS.
;; If shadows are barely visible, raise MXAO_SSAO_AMOUNT.
;; Tune the depth buffer in ReShade's overlay if shadows track wrong:
;;   Add-ons → Generic Depth → pick the buffer that matches geometry.

[MXAO.fx]
MXAO_GLOBAL_SAMPLE_QUALITY_PRESET=2
MXAO_SAMPLE_RADIUS=2.50
MXAO_SAMPLE_NORMAL_BIAS=0.20
MXAO_GLOBAL_RENDER_SCALE=0.50
MXAO_SSAO_AMOUNT=2.20
MXAO_GAMMA=2.20
MXAO_DEBUG_VIEW_ENABLE=0
MXAO_BLEND_TYPE=0

;; --- Bloom (technique is BloomAndLensFlares) ---
;; Tinted slightly cyan-blue to lean into the cyberpunk-neon mood.
;; Threshold 0.65 keeps bloom off mid-tones — only neon and UI light
;; bleeds. iBloomMixmode=2 is additive screen blend.

[Bloom.fx]
iBloomMixmode=2
fBloomThreshold=0.65
fBloomAmount=1.10
fBloomSaturation=1.30
fBloomTint=0.55,0.70,1.00
bLensdirtEnable=0

;; --- LevelsPlus (crush the blacks) ---
;; InputBlackPoint=18 lifts pure black to 18/255 then crushes everything
;; below to 0 — the classic "filmic" deepening of shadows.
;; InputWhitePoint=235 reserves the top 20 levels for highlights so
;; bright neon doesn't clip immediately.

[LevelsPlus.fx]
EnableLevels=1
InputBlackPoint=18,18,18
InputWhitePoint=235,235,235
InputGamma=1.00,1.00,1.00
OutputBlackPoint=0,0,0
OutputWhitePoint=255,255,255

;; --- Vibrance (boost the neons) ---
;; Vibrance only saturates already-saturated colors — Neocron's neon
;; signs and PSI effects pop without making skin tones look radioactive.

[Vibrance.fx]
Vibrance=0.35
VibranceRGBBalance=1.00,1.00,1.00
Vibrance_Luma=1

;; --- AdaptiveSharpen (kill the vaseline) ---
;; Frequency-aware sharpener — better than LumaSharpen at recovering
;; texture detail without amplifying noise on flat surfaces.
;; Lower curve_height for subtler effect; raise for crunchier.

[AdaptiveSharpen.fx]
curve_height=1.00
curveslope=0.50
L_overshoot=0.003
L_compr_low=0.169
L_compr_high=0.337
D_overshoot=0.009
D_compr_low=0.253
D_compr_high=0.504
