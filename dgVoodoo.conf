;
; dgVoodoo2 configuration tuned for Neocron 2.
; Place alongside D3D8.dll in the game install root.
; Edit with dgVoodooCpl.exe for a UI, or by hand below.
;

[General]
OutputAPI                       = best
FullScreenOutput                = 0
ScalingMode                     = stretched_ar
FullscreenAttributes_Resolution = unforced
FullscreenAttributes_RefreshRate= unforced
FullscreenAttributes_VSync      = on
WindowedAttributes_Resolution   = unforced
WindowedAttributes_RefreshRate  = unforced
WindowedAttributes_VSync        = on
PresentationModel               = automatic
ImageScalingMode                = integer_clamped
ImageScalingFactor              = 1
DeframerSize                    = 0
ProgressiveScanlineOrder        = 0
EnumerateRefreshRates           = 0
CapturingMouse                  = 0
DesktopResolution               = 0
DesktopBitDepth                 = false
HotkeyToggleScreenMode          = 0
DebugLayer                      = 0

[GeneralExt]
Brightness                      = 100
Contrast                        = 100
Gamma                           = 100
PostScalingFilter               = none
HudPositionX                    = 4
HudPositionY                    = 4
HudScale                        = 1

[DirectX]
Adapter                         = 0
Output                          = 0
DisplayMode                     = desktop
DepthBuffersBitDepth            = appdriven
Resolution                      = unforced
Antialiasing                    = 8x
AnisotropicFiltering            = 16x
VRAM                            = 1024
Filtering                       = appdriven
DisableAndPassThru              = 0
dgVoodooWatermark               = 0
FastVideoMemoryAccess           = 0
DeferredScreenModeSwitch        = 0
DisableMipmapping               = 0
DisableMultisampling            = 0
ForceVSyncType                  = 0
KeepFilteringForUpscaledTextures= 0
PalettizedTextures              = 0
DisableAltEnterToToggleScreenMode= 0
ForceWindowedMode               = 0
TextureMemSize                  = 1024
PS20Mode                        = ps2.0_static
ForcedVendor                    = 0
LimitFPS                        = 60

[DirectXExt]
ExtraEnumeratedResolutions      = 1280x720,1920x1080,2560x1440,3840x2160
DisplayROI                      = unspecified
HighResThinFontFix              = 0
EnableVK_NV_low_latency2        = 0
DepthBiasScale                  = 100
DownscalingFilter               = bilinear
UpscalingFilter                 = lanczos2
GammaCorrection                 = false
Bilinear2DFilter                = 0
DepthBuffersFloat               = 0
NonStandardFog                  = 0
ForcedAlphaTestThreshold        = 0
WaitFlipPattern                 = 0
RecordTAS                       = 0
SubmitDuration                  = 0
LegacyFog                       = 0
GreyscaleMode                   = false
;
; Neocron-specific: the engine's UI is laid out for 1024x768 / 1280x1024
; with hard-coded coordinates. Forcing higher resolutions makes the HUD,
; menus, and inventory windows misalign. Leave Resolution = unforced and
; pick your screen mode from the in-game video options.
;
